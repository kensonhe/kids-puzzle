<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Purple background -->
  <rect width="400" height="400" fill="#9370DB" rx="20"/>

  <!-- Left wing (upper) -->
  <path d="M 200,200 Q 80,120 60,180 Q 50,220 120,240 Q 160,250 200,230" fill="#FF69B4" stroke="#FF1493" stroke-width="2"/>

  <!-- Left wing (lower) -->
  <path d="M 200,230 Q 80,200 70,260 Q 60,300 130,310 Q 170,310 200,280" fill="#FF69B4" stroke="#FF1493" stroke-width="2"/>

  <!-- Right wing (upper) -->
  <path d="M 200,200 Q 320,120 340,180 Q 350,220 280,240 Q 240,250 200,230" fill="#FF69B4" stroke="#FF1493" stroke-width="2"/>

  <!-- Right wing (lower) -->
  <path d="M 200,230 Q 320,200 330,260 Q 340,300 270,310 Q 230,310 200,280" fill="#FF69B4" stroke="#FF1493" stroke-width="2"/>

  <!-- Wing patterns - white dots on upper left wing -->
  <circle cx="100" cy="170" r="8" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="130" cy="150" r="6" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="80" cy="190" r="5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="140" cy="180" r="4" fill="#FFFFFF" opacity="0.7"/>

  <!-- Wing patterns - white dots on upper right wing -->
  <circle cx="300" cy="170" r="8" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="270" cy="150" r="6" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="320" cy="190" r="5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="260" cy="180" r="4" fill="#FFFFFF" opacity="0.7"/>

  <!-- Wing patterns - white dots on lower left wing -->
  <circle cx="110" cy="260" r="7" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="130" cy="280" r="5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="90" cy="290" r="4" fill="#FFFFFF" opacity="0.7"/>

  <!-- Wing patterns - white dots on lower right wing -->
  <circle cx="290" cy="260" r="7" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="270" cy="280" r="5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="310" cy="290" r="4" fill="#FFFFFF" opacity="0.7"/>

  <!-- Wing edge decorations -->
  <circle cx="60" cy="180" r="4" fill="#FFD700" opacity="0.8"/>
  <circle cx="340" cy="180" r="4" fill="#FFD700" opacity="0.8"/>
  <circle cx="70" cy="260" r="4" fill="#FFD700" opacity="0.8"/>
  <circle cx="330" cy="260" r="4" fill="#FFD700" opacity="0.8"/>

  <!-- Body -->
  <ellipse cx="200" cy="255" rx="12" ry="40" fill="#333" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Head -->
  <circle cx="200" cy="200" r="15" fill="#333" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Eyes -->
  <circle cx="194" cy="195" r="4" fill="#FFFFFF"/>
  <circle cx="206" cy="195" r="4" fill="#FFFFFF"/>

  <!-- Antennae -->
  <line x1="195" y1="185" x2="180" y2="160" stroke="#333" stroke-width="2"/>
  <circle cx="180" cy="158" r="5" fill="#FF69B4"/>
  <line x1="205" y1="185" x2="220" y2="160" stroke="#333" stroke-width="2"/>
  <circle cx="220" cy="158" r="5" fill="#FF69B4"/>
</svg>