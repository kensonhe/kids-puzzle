<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#FFF8E1"/>
  <!-- 身体 -->
  <ellipse cx="200" cy="250" rx="100" ry="110" fill="#9E9E9E"/>
  <!-- 头 -->
  <circle cx="200" cy="160" r="70" fill="#9E9E9E"/>
  <!-- 大耳朵 -->
  <ellipse cx="120" cy="140" rx="40" ry="55" fill="#BDBDBD"/>
  <ellipse cx="280" cy="140" rx="40" ry="55" fill="#BDBDBD"/>
  <ellipse cx="120" cy="140" rx="25" ry="40" fill="#E0E0E0"/>
  <ellipse cx="280" cy="140" rx="25" ry="40" fill="#E0E0E0"/>
  <!-- 眼睛 -->
  <circle cx="175" cy="155" r="12" fill="#333"/>
  <circle cx="225" cy="155" r="12" fill="#333"/>
  <circle cx="175" cy="150" r="5" fill="white"/>
  <circle cx="225" cy="150" r="5" fill="white"/>
  <!-- 象鼻 -->
  <path d="M200,180 Q190,220 180,240 Q170,250 185,260" stroke="#9E9E9E" fill="#9E9E9E" stroke-width="12" stroke-linecap="round"/>
  <!-- 嘴巴 -->
  <path d="M185,260 Q190,270 200,260" stroke="#757575" fill="none" stroke-width="2"/>
  <!-- 腮红 -->
  <circle cx="155" cy="175" r="12" fill="#FFB6C1" opacity="0.4"/>
  <circle cx="245" cy="175" r="12" fill="#FFB6C1" opacity="0.4"/>
  <!-- 脚 -->
  <ellipse cx="160" cy="360" rx="30" ry="15" fill="#BDBDBD"/>
  <ellipse cx="240" cy="360" rx="30" ry="15" fill="#BDBDBD"/>
  <!-- 尾巴 -->
  <ellipse cx="300" cy="300" rx="15" ry="30" fill="#BDBDBD"/>
</svg>